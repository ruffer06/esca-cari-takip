<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cari Takip</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --surface: #181c27; --surface2: #1e2336; --border: #2a2f45;
    --accent: #4f8ef7; --accent2: #34d399; --danger: #f87171; --warn: #fbbf24;
    --text: #e8eaf0; --text2: #8892aa; --text3: #4a5268;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .main { flex: 1; overflow-y: auto; }
  .sidebar-header { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
  .logo { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .logo span { color: var(--text2); font-weight: 400; }
  .nav-section { padding: 12px 10px 4px; font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; }
  .nav-btn { display: flex; align-items: center; gap: 10px; padding: 9px 12px; margin: 1px 4px; border-radius: 7px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all .15s; border: none; background: none; width: calc(100% - 8px); text-align: left; }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: rgba(79,142,247,.12); color: var(--accent); }
  .nav-btn .icon { font-size: 14px; width: 18px; text-align: center; }
  .musteri-list { flex: 1; overflow-y: auto; padding: 4px; }
  .musteri-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; margin: 1px 2px; border-radius: 7px; cursor: pointer; font-size: 12px; transition: all .15s; }
  .musteri-item:hover { background: var(--surface2); }
  .musteri-item.active { background: rgba(79,142,247,.12); }
  .m-name { color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 128px; }
  .m-bak { font-family: var(--mono); font-size: 10px; font-weight: 600; }
  .m-bak.borclu { color: var(--danger); }
  .m-bak.alacakli { color: var(--accent2); }
  .m-bak.kapali { color: var(--text3); }
  .sidebar-footer { padding: 12px 8px; border-top: 1px solid var(--border); }
  .btn-sidebar-yeni { width: 100%; padding: 9px; border-radius: 8px; background: var(--accent); color: #fff; font-family: var(--sans); font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: opacity .15s; }
  .btn-sidebar-yeni:hover { opacity: .85; }
  .page-header { padding: 28px 32px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .page-title { font-size: 20px; font-weight: 600; }
  .page-sub { font-size: 12px; color: var(--text2); margin-top: 2px; font-family: var(--mono); }
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px 32px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .kpi-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .kpi-val { font-family: var(--mono); font-size: 22px; font-weight: 600; margin-top: 6px; }
  .kpi-val.blue{color:var(--accent)} .kpi-val.green{color:var(--accent2)} .kpi-val.red{color:var(--danger)} .kpi-val.warn{color:var(--warn)}
  .section { padding: 0 32px 32px; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; margin-top: 24px; }
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { padding: 11px 14px; text-align: left; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); border-bottom: 1px solid var(--border); background: var(--surface2); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 10px 14px; color: var(--text); }
  .td-mono { font-family: var(--mono); font-size: 12px; }
  .td-right { text-align: right; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green{background:rgba(52,211,153,.12);color:var(--accent2)} .badge-red{background:rgba(248,113,113,.12);color:var(--danger)}
  .badge-warn{background:rgba(251,191,36,.12);color:var(--warn)} .badge-gray{background:rgba(138,146,170,.1);color:var(--text2)}
  .btn { padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; font-family: var(--sans); transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: .85; }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text3); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .cari-info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px 32px 0; }
  .info-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; }
  .info-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .info-val { font-size: 13px; color: var(--text); margin-top: 4px; font-weight: 500; }
  .bakiye-banner { margin: 20px 32px 0; border-radius: 10px; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .bakiye-banner.borclu { background: rgba(248,113,113,.07); border: 1px solid rgba(248,113,113,.2); }
  .bakiye-banner.alacakli { background: rgba(52,211,153,.07); border: 1px solid rgba(52,211,153,.2); }
  .bakiye-banner.kapali { background: var(--surface); border: 1px solid var(--border); }
  .bakiye-label { font-size: 12px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .bakiye-amount { font-family: var(--mono); font-size: 26px; font-weight: 600; }
  .bakiye-amount.borclu{color:var(--danger)} .bakiye-amount.alacakli{color:var(--accent2)} .bakiye-amount.kapali{color:var(--text2)}
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 480px; max-height: 90vh; overflow-y: auto; padding: 28px; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 6px; }
  .form-row input, .form-row select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; transition: border .15s; }
  .form-row input:focus, .form-row select:focus { border-color: var(--accent); }
  .form-row input[readonly] { opacity: .5; cursor: not-allowed; }
  .form-row select option { background: var(--surface2); color: var(--text); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .empty { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }
  .del-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; padding: 3px 7px; border-radius: 4px; transition: all .15s; }
  .del-btn:hover { color: var(--danger); background: rgba(248,113,113,.1); }
  .link-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 13px; font-weight: 500; font-family: var(--sans); padding: 0; }
  .link-btn:hover { text-decoration: underline; }
  ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

  /* Import page */
  .import-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 40px 24px; text-align: center; cursor: pointer; transition: all .2s; margin-bottom: 20px; }
  .import-zone:hover, .import-zone.drag-over { border-color: var(--accent); background: rgba(79,142,247,.04); }
  .import-zone-icon { font-size: 36px; margin-bottom: 12px; }
  .import-zone-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .import-zone-sub { font-size: 12px; color: var(--text2); }
  .import-zone input[type=file] { display: none; }
  .step-list { counter-reset: step; }
  .step-item { display: flex; gap: 14px; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .step-item:last-child { border-bottom: none; }
  .step-num { width: 26px; height: 26px; border-radius: 50%; background: rgba(79,142,247,.15); color: var(--accent); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .step-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .step-text strong { color: var(--text); }
  .import-result { border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; }
  .import-result.success { background: rgba(52,211,153,.07); border: 1px solid rgba(52,211,153,.2); }
  .import-result.error { background: rgba(248,113,113,.07); border: 1px solid rgba(248,113,113,.2); }
  .import-result.warning { background: rgba(251,191,36,.07); border: 1px solid rgba(251,191,36,.2); }
  .result-title { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
  .result-title.success { color: var(--accent2); }
  .result-title.error { color: var(--danger); }
  .result-title.warning { color: var(--warn); }
  .result-detail { font-size: 12px; color: var(--text2); line-height: 1.7; }
  .tag { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; font-family: var(--mono); font-size: 11px; color: var(--text2); margin: 1px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width:900px){.two-col{grid-template-columns:1fr}}
  .fade-in { animation: fadeIn .18s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">CARİ<span> TAKİP</span></div>
    </div>
    <div class="nav-section">Menü</div>
    <button class="nav-btn active" id="nav-dashboard">
      <span class="icon">◉</span> Dashboard
    </button>
    <button class="nav-btn" id="nav-musteriler">
      <span class="icon">◈</span> Müşteriler
    </button>
    <button class="nav-btn" id="nav-import">
      <span class="icon">⇪</span> Paraşüt'ten Aktar
    </button>
    <button class="nav-btn" id="nav-banka">
      <span class="icon">🏦</span> Banka Ekstresi
    </button>
    <div class="nav-section" style="margin-top:8px">Cari Hesaplar</div>
    <div class="musteri-list" id="sidebar-musteri-list"></div>
    <div class="sidebar-footer">
      <button class="btn-sidebar-yeni" id="btn-sidebar-yeni">+ Yeni Müşteri</button>
    </div>
  </aside>
  <main class="main" id="main-content"></main>
</div>

<div class="overlay" id="modal-overlay" style="display:none">
  <div class="modal" id="modal-box"></div>
</div>

<script>
(function() {
'use strict';

const STORE_KEY = 'cari_takip_v2';

function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    musteriler: [
      { id:'MUS001', ad:'ABC Ticaret A.Ş.',     vkn:'1234567890', tel:'0312 555 01 01', mail:'info@abc.com',    sehir:'Ankara',   durum:'Aktif' },
      { id:'MUS002', ad:'XYZ Mühendislik Ltd.',  vkn:'9876543210', tel:'0212 555 02 02', mail:'xyz@xyz.com',     sehir:'İstanbul', durum:'Aktif' },
      { id:'MUS003', ad:'Demir İnşaat',          vkn:'5556667778', tel:'0232 555 03 03', mail:'demir@mail.com',  sehir:'İzmir',    durum:'Aktif' },
      { id:'MUS004', ad:'Yıldız Tekstil A.Ş.',   vkn:'1112223334', tel:'0322 555 04 04', mail:'yildiz@mail.com', sehir:'Adana',    durum:'Pasif' },
      { id:'MUS005', ad:'Güneş Tarım Ltd.',       vkn:'4445556667', tel:'0342 555 05 05', mail:'gunes@mail.com',  sehir:'Konya',    durum:'Aktif' },
    ],
    islemler: [
      { id:'i1',  musteriId:'MUS001', tarih:'2026-04-01', belge:'FTR-2026-001', tur:'Fatura',   aciklama:'Yazılım hizmet bedeli', tutar:10000, kdv:1800 },
      { id:'i2',  musteriId:'MUS001', tarih:'2026-04-03', belge:'TAH-2026-001', tur:'Tahsilat', aciklama:'Nisan ödemesi',          tutar:5000,  kdv:0    },
      { id:'i3',  musteriId:'MUS001', tarih:'2026-04-10', belge:'FTR-2026-005', tur:'Fatura',   aciklama:'Ek destek hizmeti',      tutar:3000,  kdv:540  },
      { id:'i4',  musteriId:'MUS002', tarih:'2026-04-05', belge:'FTR-2026-002', tur:'Fatura',   aciklama:'Danışmanlık hizmeti',    tutar:15000, kdv:2700 },
      { id:'i5',  musteriId:'MUS002', tarih:'2026-04-15', belge:'TAH-2026-002', tur:'Tahsilat', aciklama:'Kısmi ödeme',            tutar:10000, kdv:0    },
      { id:'i6',  musteriId:'MUS003', tarih:'2026-04-08', belge:'FTR-2026-003', tur:'Fatura',   aciklama:'Malzeme satışı',         tutar:8500,  kdv:1530 },
      { id:'i7',  musteriId:'MUS003', tarih:'2026-04-20', belge:'TAH-2026-003', tur:'Tahsilat', aciklama:'Tam ödeme',              tutar:10030, kdv:0    },
      { id:'i8',  musteriId:'MUS004', tarih:'2026-04-12', belge:'FTR-2026-006', tur:'Fatura',   aciklama:'Tekstil ürünleri',       tutar:6000,  kdv:1080 },
      { id:'i9',  musteriId:'MUS005', tarih:'2026-04-18', belge:'FTR-2026-004', tur:'Fatura',   aciklama:'Tarım ekipmanı',         tutar:22000, kdv:3960 },
      { id:'i10', musteriId:'MUS005', tarih:'2026-04-21', belge:'TAH-2026-004', tur:'Tahsilat', aciklama:'İlk taksit ödemesi',     tutar:10000, kdv:0    },
    ]
  };
}

function saveData() { localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }

let DB = loadData();
let currentPage = 'dashboard';
let currentMusteriId = null;

// ── Yardımcılar ─────────────────────────────────────────────────────────
function getMusteriIslemleri(mid) { return DB.islemler.filter(i => i.musteriId === mid); }

function getMusteriOzet(mid) {
  let fatura = 0, tahsilat = 0;
  getMusteriIslemleri(mid).forEach(i => {
    if (i.tur === 'Fatura') fatura += i.tutar + i.kdv;
    else tahsilat += i.tutar;
  });
  return { fatura, tahsilat, bakiye: fatura - tahsilat };
}

function bakiyeDurum(b) { return b > 0 ? 'borclu' : b < 0 ? 'alacakli' : 'kapali'; }

function formatTL(n) {
  const abs = Math.abs(n).toLocaleString('tr-TR', { minimumFractionDigits:2, maximumFractionDigits:2 });
  return (n < 0 ? '-' : '') + '₺' + abs;
}

function formatDate(d) {
  if (!d) return '';
  const p = d.split('-');
  return p[2] + '.' + p[1] + '.' + p[0];
}

function nextIslemId() {
  const nums = DB.islemler.map(i => parseInt(i.id.replace('i',''))).filter(n => !isNaN(n));
  return 'i' + (Math.max(0, ...nums) + 1);
}

function nextMusteriId() {
  const nums = DB.musteriler.map(m => parseInt(m.id.replace('MUS',''))).filter(n => !isNaN(n));
  return 'MUS' + String(Math.max(0, ...nums) + 1).padStart(3,'0');
}

// ── Sidebar ──────────────────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('sidebar-musteri-list');
  if (!DB.musteriler.length) {
    el.innerHTML = '<div style="padding:14px 10px;font-size:11px;color:var(--text3);text-align:center">Henüz müşteri yok</div>';
    return;
  }
  var sortedM = DB.musteriler.slice().sort(function(a,b){ return a.ad.localeCompare(b.ad,'tr'); });
  el.innerHTML = sortedM.map(m => {
    const oz = getMusteriOzet(m.id);
    const d  = bakiyeDurum(oz.bakiye);
    const active = (currentPage === 'cari' && currentMusteriId === m.id) ? ' active' : '';
    return '<div class="musteri-item' + active + '" data-mid="' + m.id + '">' +
      '<span class="m-name" title="' + m.ad + '">' + m.ad + '</span>' +
      '<span class="m-bak ' + d + '">' + (oz.bakiye === 0 ? '–' : formatTL(oz.bakiye)) + '</span>' +
    '</div>';
  }).join('');
  el.querySelectorAll('.musteri-item').forEach(function(item) {
    item.addEventListener('click', function() { showCari(this.dataset.mid); });
  });
}

// ── Sayfa geçişleri ──────────────────────────────────────────────────────
function showPage(page) {
  currentPage = page;
  currentMusteriId = null;
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  var nb = document.getElementById('nav-' + page);
  if (nb) nb.classList.add('active');
  renderSidebar();
  if (page === 'dashboard') renderDashboard();
  else if (page === 'musteriler') renderMusteriler();
}

function showCari(mid) {
  currentPage = 'cari';
  currentMusteriId = mid;
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  renderSidebar();
  renderCari(mid);
}

// ── Dashboard ────────────────────────────────────────────────────────────
function renderDashboard() {
  var toplamFatura = 0, toplamTahsilat = 0, borcluSayisi = 0;
  DB.musteriler.forEach(function(m) {
    var oz = getMusteriOzet(m.id);
    toplamFatura   += oz.fatura;
    toplamTahsilat += oz.tahsilat;
    if (oz.bakiye > 0) borcluSayisi++;
  });
  var acikBakiye = toplamFatura - toplamTahsilat;

  var rowsHtml = '';
  DB.musteriler.slice().sort(function(a,b){ return a.ad.localeCompare(b.ad,'tr'); }).forEach(function(m) {
    var oz = getMusteriOzet(m.id);
    var d  = bakiyeDurum(oz.bakiye);
    var dLabel = d==='borclu'?'Borçlu':d==='alacakli'?'Alacaklı':'Kapalı';
    var dCls   = d==='borclu'?'badge-red':d==='alacakli'?'badge-green':'badge-gray';
    var bakColor = d==='borclu'?'var(--danger)':d==='alacakli'?'var(--accent2)':'var(--text2)';
    rowsHtml += '<tr>' +
      '<td><button class="link-btn" data-mid="' + m.id + '">' + m.ad + '</button></td>' +
      '<td><span class="badge ' + (m.durum==='Aktif'?'badge-green':'badge-gray') + '">' + m.durum + '</span></td>' +
      '<td class="td-mono td-right">' + formatTL(oz.fatura) + '</td>' +
      '<td class="td-mono td-right" style="color:var(--accent2)">' + formatTL(oz.tahsilat) + '</td>' +
      '<td class="td-mono td-right" style="color:' + bakColor + ';font-weight:600">' + formatTL(oz.bakiye) + '</td>' +
      '<td><span class="badge ' + dCls + '">' + dLabel + '</span></td>' +
    '</tr>';
  });
  if (!rowsHtml) rowsHtml = '<tr><td colspan="6" class="empty">Müşteri bulunamadı</td></tr>';

  var mc = document.getElementById('main-content');
  mc.innerHTML = '<div class="fade-in">' +
    '<div class="page-header">' +
      '<div><div class="page-title">Dashboard</div>' +
      '<div class="page-sub">Genel özet · ' + new Date().toLocaleDateString('tr-TR') + '</div></div>' +
      '<div class="header-actions"><button class="btn btn-primary" id="db-yeni">+ Yeni Müşteri</button></div>' +
    '</div>' +
    '<div class="kpi-grid">' +
      '<div class="kpi"><div class="kpi-label">Toplam Fatura</div><div class="kpi-val blue">' + formatTL(toplamFatura) + '</div></div>' +
      '<div class="kpi"><div class="kpi-label">Toplam Tahsilat</div><div class="kpi-val green">' + formatTL(toplamTahsilat) + '</div></div>' +
      '<div class="kpi"><div class="kpi-label">Açık Bakiye</div><div class="kpi-val ' + (acikBakiye>0?'red':'green') + '">' + formatTL(acikBakiye) + '</div></div>' +
      '<div class="kpi"><div class="kpi-label">Borçlu Müşteri</div><div class="kpi-val warn">' + borcluSayisi + '</div></div>' +
    '</div>' +

function saveMusteriAction(editId) {
  var ad = document.getElementById('f-ad').value.trim();
  if (!ad) { alert('Müşteri adı zorunludur.'); return; }
  var data = {
    id:    document.getElementById('f-id').value.trim() || nextMusteriId(),
    ad:    ad,
    vkn:   document.getElementById('f-vkn').value.trim(),
    tel:   document.getElementById('f-tel').value.trim(),
    mail:  document.getElementById('f-mail').value.trim(),
    sehir: document.getElementById('f-sehir').value.trim(),
    durum: document.getElementById('f-durum').value,
  };
  if (editId) {
    var idx = DB.musteriler.findIndex(function(x) { return x.id === editId; });
    if (idx >= 0) DB.musteriler[idx] = data;
  } else {
    DB.musteriler.push(data);
  }
  saveData();
  closeModal();
  renderSidebar();
  if (currentPage === 'dashboard') renderDashboard();
  else if (currentPage === 'musteriler') renderMusteriler();
  else if (currentPage === 'cari') renderCari(currentMusteriId);
}

function deleteMusteriAction(mid) {

}

function handleCSV(file) {
  var ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'xlsx' || ext === 'xls') {
    // Load SheetJS dynamically then parse
    if (typeof XLSX !== 'undefined') {
      readXLSX(file);
    } else {
      var script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      script.onload = function() { readXLSX(file); };
      script.onerror = function() {
        showImportResult('error', 'Kütüphane yüklenemedi', 'İnternet bağlantınızı kontrol edin ve tekrar deneyin.');
      };
      document.head.appendChild(script);
    }
  } else {
    var reader = new FileReader();
    reader.onload = function(e) {
      parseAndImportCSV(e.target.result, file.name);
    };
    reader.readAsText(file, 'UTF-8');
  }
}

function readXLSX(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var workbook = XLSX.read(data, { type: 'array' });
      var sheetName = workbook.SheetNames[0];
      var sheet = workbook.Sheets[sheetName];
      var rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
      if (!rows.length) {
        showImportResult('error', 'Dosya boş veya okunamadı', 'Excel dosyasını kontrol edin.');
        return;
      }
      detectAndImport(rows, file.name);
    } catch(err) {
      showImportResult('error', 'Excel okunamadı', 'Hata: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseCSV(text) {
  var lines = text.split(/\r?\n/).filter(function(l) { return l.trim(); });
  if (!lines.length) return [];
  // Detect delimiter
  var delim = lines[0].indexOf(';') > lines[0].indexOf(',') ? ';' : ',';
  var headers = splitCSVLine(lines[0], delim).map(function(h) { return h.trim().replace(/^"|"$/g, ''); });
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    var cells = splitCSVLine(lines[i], delim).map(function(c) { return c.trim().replace(/^"|"$/g, ''); });
    if (cells.every(function(c){ return !c; })) continue;
    var row = {};
    headers.forEach(function(h, idx) { row[h] = cells[idx] || ''; });
    rows.push(row);
  }
  return rows;
}

function splitCSVLine(line, delim) {
  var result = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === delim && !inQ) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result;
}

function parseAndImportCSV(text, filename) {
  var rows = parseCSV(text);
  if (!rows.length) {
    showImportResult('error', 'Dosya boş veya okunamadı', 'CSV dosyasını kontrol edin.');
    return;
  }
  detectAndImport(rows, filename);
}

function findCol(row, candidates) {
  var keys = Object.keys(row);
  for (var i = 0; i < candidates.length; i++) {
    var c = candidates[i];
    for (var j = 0; j < keys.length; j++) {
      if (keys[j].toLowerCase().indexOf(c.toLowerCase()) !== -1) return keys[j];
    }
  }
  return null;
}

function detectAndImport(rows, filename) {
  var headers = Object.keys(rows[0]);
  var h = headers.join('|').toLowerCase();

  // Paraşüt Müşteri: "Müşteri/tedarikçi ismi" sütunu var
  var isMusteriFile = h.indexOf('müşteri/tedarikçi ismi') !== -1 || h.indexOf('musteri/tedarikci ismi') !== -1;
  // Paraşüt Fatura: "Düzenleme tarihi" + "Müşteri" + "Ara toplam" sütunları var
  var isFaturaFile  = h.indexOf('düzenleme tarihi') !== -1 || h.indexOf('duzenleme tarihi') !== -1 ||
                      (h.indexOf('genel toplam') !== -1 && h.indexOf('müşteri') !== -1);

  if (!isMusteriFile && !isFaturaFile) {
    showImportResult('warning',
      'Sütunlar otomatik tanınamadı',
      'Dosyadaki sütunlar: ' + headers.map(function(h){ return '<span class="tag">'+h+'</span>'; }).join(' ') +
      '<br><br>Paraşüt\'ten <strong>Müşteriler</strong> veya <strong>Satış Faturaları</strong> sayfasını dışa aktardığınızdan emin olun.'
    );
    return;
  }

  if (isMusteriFile) importMusteriler(rows, headers);
  else importFaturalar(rows, headers);
}

function importMusteriler(rows, headers) {
  var added = 0, skipped = 0;

  rows.forEach(function(row) {
    // Paraşüt gerçek sütun adı: "Müşteri/tedarikçi ismi"
    var ad = String(row['Müşteri/tedarikçi ismi'] || row['Unvan'] || row['Ünvan'] || row['Ad'] || '').trim();
    if (!ad) { skipped++; return; }

    var exists = DB.musteriler.find(function(m) { return m.ad.toLowerCase() === ad.toLowerCase(); });
    if (exists) { skipped++; return; }

    var vkn   = String(row['Vergi numarası/TC kimlik no'] || row['Vergi No'] || row['VKN'] || '').trim();
    var tel   = String(row['Telefon'] || row['Tel'] || '').trim();
    var mail  = String(row['E-posta'] || row['Email'] || '').trim();
    var sehir = String(row['İl'] || row['Şehir'] || row['Sehir'] || '').trim();

    DB.musteriler.push({
      id:    nextMusteriId(),
      ad:    ad,
      vkn:   vkn,
      tel:   tel,
      mail:  mail,
      sehir: sehir,
      durum: 'Aktif'
    });
    added++;
  });

  saveData(); renderSidebar();
  showImportResult('success',
    '✓ ' + added + ' müşteri aktarıldı',
    (skipped ? skipped + ' kayıt atlandı (zaten mevcut veya boş isim). ' : '') +
    'Toplam müşteri sayısı: <strong>' + DB.musteriler.length + '</strong>',
    function() { showPage('musteriler'); }, 'Müşterilere Git'
  );
}

function importFaturalar(rows, headers) {
  var added = 0, skipped = 0, noMatch = 0;

  rows.forEach(function(row) {
    // Paraşüt gerçek sütun adları
    var musteriAd = String(row['Müşteri'] || row['Müşteri Adı'] || '').trim();
    if (!musteriAd) { skipped++; return; }

    // Müşteriyi bul veya oluştur
    var musteri = DB.musteriler.find(function(m) {
      return m.ad.toLowerCase() === musteriAd.toLowerCase() ||
             musteriAd.toLowerCase().indexOf(m.ad.toLowerCase()) !== -1 ||
             m.ad.toLowerCase().indexOf(musteriAd.toLowerCase()) !== -1;
    });
    if (!musteri) {
      var vkn = String(row['Müşteri vergi numarası'] || '').trim();
      musteri = { id: nextMusteriId(), ad: musteriAd, vkn: vkn, tel:'', mail:'', sehir:'', durum:'Aktif' };
      DB.musteriler.push(musteri);
      noMatch++;
    }

    // Tarih — SheetJS Date objesi veya string olabilir
    var tarihRaw = row['Düzenleme tarihi'] || row['Tarih'] || '';
    var tarih = '';
    if (tarihRaw instanceof Date) {
      tarih = tarihRaw.toISOString().split('T')[0];
    } else if (tarihRaw) {
      var ts = String(tarihRaw).trim();
      if (/^\d{2}\.\d{2}\.\d{4}/.test(ts)) {
        var p = ts.split('.'); tarih = p[2]+'-'+p[1]+'-'+p[0];
      } else if (/^\d{4}-\d{2}-\d{2}/.test(ts)) {
        tarih = ts.substring(0,10);
      } else {
        tarih = new Date().toISOString().split('T')[0];
      }
    } else {
      tarih = new Date().toISOString().split('T')[0];
    }

    function parseAmt(val) {
      if (val === null || val === undefined || val === '') return 0;
      if (typeof val === 'number') return val;
      return parseFloat(String(val).replace(/[^0-9,.-]/g,'').replace(',','.')) || 0;
    }

    // Paraşüt: "Ara toplam" = KDV hariç, "Toplam KDV" = KDV, "Genel Toplam" = toplam
    var tutar = parseAmt(row['Ara toplam'] || row['Net Tutar'] || row['Tutar'] || 0);
    var kdv   = parseAmt(row['Toplam KDV'] || row['KDV Tutarı'] || row['KDV'] || 0);
    if (!tutar && !kdv) { skipped++; return; }

    // Fatura türü
    var turRaw = String(row['Fatura türü'] || row['Tür'] || '').toLowerCase();
    var tur = (turRaw.indexOf('iade') !== -1 || turRaw.indexOf('tahsilat') !== -1) ? 'Tahsilat' : 'Fatura';

    // Belge no: seri + sıra
    var seri  = String(row['Fatura seri'] || '').trim();
    var sira  = String(row['Fatura sıra'] || '').trim();
    var belge = sira || seri || '';

    // Açıklama
    var aciklama = String(row['Fatura ismi'] || row['Ürün/hizmet'] || row['Ürün/hizmet açıklaması'] || 'Paraşüt\'ten aktarıldı').trim() || 'Paraşüt\'ten aktarıldı';

    DB.islemler.push({
      id:        nextIslemId(),
      musteriId: musteri.id,
      tarih:     tarih,
      belge:     belge,
      tur:       tur,
      aciklama:  aciklama,
      tutar:     tutar,
      kdv:       kdv
    });
    added++;
  });

  saveData(); renderSidebar();
  showImportResult('success',
    '✓ ' + added + ' fatura aktarıldı',
    (noMatch ? '<strong>' + noMatch + '</strong> yeni müşteri otomatik oluşturuldu. ' : '') +
    (skipped ? skipped + ' satır atlandı. ' : '') +
    'Toplam işlem sayısı: <strong>' + DB.islemler.length + '</strong>',
    function() { showPage('dashboard'); }, 'Dashboard\'a Git'
  );
}

function showImportResult(type, title, detail, btnFn, btnLabel) {
  var area = document.getElementById('import-result-area');
  area.innerHTML = '<div class="import-result ' + type + '">' +
    '<div class="result-title ' + type + '">' + title + '</div>' +
    '<div class="result-detail">' + detail + '</div>' +
  '</div>';
  var actArea = document.getElementById('import-action-area');
  if (btnFn && btnLabel) {
    actArea.innerHTML = '';
    var btn = document.createElement('button');
    btn.className = 'btn btn-primary';
    btn.textContent = btnLabel;
    btn.addEventListener('click', btnFn);
    actArea.appendChild(btn);
    var again = document.createElement('button');
    again.className = 'btn btn-ghost';
    again.textContent = 'Tekrar Yükle';
    again.addEventListener('click', function() { renderImport(); });
    actArea.appendChild(again);
  }
}

function handleBankaFile(file) {
  var ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'pdf') {
    var reader = new FileReader();
    reader.onload = function(e) {
      parseBankaPDF(e.target.result);
    };
    reader.readAsArrayBuffer(file);
  } else if (ext === 'xlsx' || ext === 'xls') {
    if (typeof XLSX !== 'undefined') {
      readBankaXLSX(file);
    } else {
      var script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      script.onload = function() { readBankaXLSX(file); };
      document.head.appendChild(script);
    }
  } else {
    var reader2 = new FileReader();
    reader2.onload = function(e) { parseBankaCSV(e.target.result); };
    reader2.readAsText(file, 'UTF-8');
  }
}

function readBankaXLSX(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      var ws = wb.Sheets[wb.SheetNames[0]];
      // Yapı Kredi formatı: başlık 14. satırda, önce ham satırları al
      var rawRows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
      // "Tarih" başlığı olan satırı bul
      var headerIdx = -1;
      for (var i = 0; i < rawRows.length; i++) {
        if (rawRows[i] && String(rawRows[i][0] || '').trim() === 'Tarih') {
          headerIdx = i; break;
        }
      }
      if (headerIdx !== -1) {
        // Yapı Kredi özel parser
        parseYapiKrediXLSX(rawRows.slice(headerIdx + 1));
      } else {
        // Standart format dene
        var rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
        parseBankaRows(rows);
      }
    } catch(err) {
      showBankaResult('error', 'Excel okunamadı', 'Hata: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseYapiKrediXLSX(rows) {
  // Yapı Kredi Excel formatı:
  // Sütun 0=Tarih, 1=Valör, 3=Açıklama(parçalar), 4=İşlem Tutarı(string "69.193,63 TL")
  // Her işlem birden fazla satıra yayılmış, tutarı olan satır son satır
  function parseTutar(val) {
    if (val === null || val === undefined || val === '') return null;
    var s = String(val).replace(/[ TL]/gi,'').replace(/\./g,'').replace(',','.');
    var n = parseFloat(s);
    return isNaN(n) ? null : n;
  }

  var transactions = [];
  var acikParts = [];
  var tarih = null;

  rows.forEach(function(row) {
    if (!row) return;
    var tarihVal  = row[0];
    var acikVal   = row[3] !== null && row[3] !== undefined ? String(row[3]).trim() : '';
    var tutarVal  = row[4];

    // Tarih varsa güncelle
    if (tarihVal && typeof tarihVal === 'object' && tarihVal instanceof Date) {
      tarih = tarihVal.toISOString().split('T')[0];
    } else if (tarihVal && typeof tarihVal === 'number') {
      // Excel serial date
      var d = new Date(Math.round((tarihVal - 25569) * 86400 * 1000));
      tarih = d.toISOString().split('T')[0];
    }

    // Açıklama parçası topla
    if (acikVal) acikParts.push(acikVal);

    // Tutar geldi mi? → işlem tamamlandı
    var tutar = parseTutar(tutarVal);
    if (tutar !== null && acikParts.length > 0) {
      var aciklama = acikParts.join(' ').trim();
      var skip = /BAKİYE|AÇILI|KAPANI/i.test(aciklama);
      if (!skip && tarih) {
        transactions.push({ tarih: tarih, aciklama: aciklama, tutar: tutar });
      }
      acikParts = [];
    }
  });

  if (!transactions.length) {
    showBankaResult('error', 'İşlem bulunamadı', 'Excel formatı tanınamadı.');
    return;
  }

  var gelenler = transactions.filter(function(t) { return t.tutar > 0; });
  if (!gelenler.length) {
    showBankaResult('warning', 'Gelen ödeme bulunamadı', 'Dosyada pozitif (gelen) işlem yok.');
    return;
  }
  gosterEslestirme(gelenler);
}

function parseBankaCSV(text) {
  // Basit CSV parse
  var lines = text.split(/\r?\n/).filter(function(l) { return l.trim(); });
  if (lines.length < 2) { showBankaResult('error', 'Dosya boş', ''); return; }
  var delim = lines[0].indexOf(';') >= 0 ? ';' : ',';
  var headers = lines[0].split(delim).map(function(h) { return h.replace(/"/g,'').trim(); });
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    var cells = lines[i].split(delim).map(function(c) { return c.replace(/"/g,'').trim(); });
    var row = {};
    headers.forEach(function(h, idx) { row[h] = cells[idx] || ''; });
    rows.push(row);
  }
  parseBankaRows(rows);
}

// Yapı Kredi PDF'ini metin olarak parse et
// PDF binary olduğu için text okuma çalışmaz — kullanıcıya alternatif göster
function parseBankaPDF(text, filename) {
  // PDF binary gelir, metin değil — kullanıcıyı bilgilendir
  showBankaResult('warning',
    'PDF doğrudan okunamıyor',
    'Yapı Kredi ekstresi PDF formatında. Lütfen şu adımları izleyin:<br><br>' +
    '1. <strong>İnternet bankacılığında</strong> hesap hareketleri sayfasında <strong>Excel\'e Aktar</strong> seçeneğini kullanın<br>' +
    '2. Veya PDF\'i <strong><a href="https://pdftenexcel.com" target="_blank" style="color:var(--accent)">pdftenexcel.com</a></strong> üzerinden Excel\'e çevirip yükleyin<br><br>' +
    'Excel (.xlsx) formatını yükleyince otomatik işlenecek.'
  );
}

function parseBankaRows(rows) {
  if (!rows.length) { showBankaResult('error', 'Dosya boş veya okunamadı', ''); return; }

  var headers = Object.keys(rows[0]);
  // Yapı Kredi sütunları: Tarih, Valör Tarihi, Açıklama, İşlem Tutarı, Güncel Bakiye
  var tarihCol   = findBankaCol(headers, ['Tarih','tarih','DATE','Date','TARİH']);
  var acikCol    = findBankaCol(headers, ['Açıklama','aciklama','AÇIKLAMA','Aciklama','Description','DESCRIPTION','Detay']);
  var tutarCol   = findBankaCol(headers, ['İşlem Tutarı','Tutar','TUTAR','Amount','AMOUNT','işlem tutarı','Alacak','Borç']);

  if (!tarihCol || !acikCol || !tutarCol) {
    showBankaResult('warning',
      'Sütunlar tanınamadı',
      'Bulunan sütunlar: ' + headers.map(function(h){ return '<span class="tag">'+h+'</span>'; }).join(' ') +
      '<br><br>Beklenen sütunlar: <span class="tag">Tarih</span> <span class="tag">Açıklama</span> <span class="tag">İşlem Tutarı</span>'
    );
    return;
  }

  // Sadece gelen (pozitif) işlemleri al
  var gelenler = [];
  rows.forEach(function(row) {
    var tutarRaw = String(row[tutarCol] || '').replace(/[ \t]/g,'').replace(',','.');
    // "TL" ve boşlukları temizle
    tutarRaw = tutarRaw.replace(/TL/gi,'').replace(/[.]/g,'').replace(',','.');
    var tutar = parseFloat(tutarRaw);
    if (!tutar || tutar <= 0) return; // sadece gelenler (pozitif)

    var tarihRaw = String(row[tarihCol] || '').trim();
    var tarih = '';
    if (/^\d{2}\.\d{2}\.\d{4}/.test(tarihRaw)) {
      var p = tarihRaw.split('.'); tarih = p[2]+'-'+p[1]+'-'+p[0];
    } else if (/^\d{4}-\d{2}-\d{2}/.test(tarihRaw)) {
      tarih = tarihRaw.substring(0,10);
    } else if (tarihRaw instanceof Date || !isNaN(Date.parse(tarihRaw))) {
      tarih = new Date(tarihRaw).toISOString().split('T')[0];
    } else {
      return;
    }

    var aciklama = String(row[acikCol] || '').trim();
    if (!aciklama || aciklama.toUpperCase().indexOf('BAKİYE') !== -1 || aciklama.toUpperCase().indexOf('BAKIYE') !== -1) return;

    gelenler.push({ tarih: tarih, aciklama: aciklama, tutar: tutar, row: row });
  });

  if (!gelenler.length) {
    showBankaResult('warning', 'Gelen ödeme bulunamadı', 'Dosyada pozitif (gelen) işlem yok veya format tanınamadı.');
    return;
  }

  gosterEslestirme(gelenler);
}

function findBankaCol(headers, candidates) {
  for (var i = 0; i < candidates.length; i++) {
    for (var j = 0; j < headers.length; j++) {
      if (headers[j].toLowerCase().trim() === candidates[i].toLowerCase().trim()) return headers[j];
    }
  }
  // partial match
  for (var i = 0; i < candidates.length; i++) {
    for (var j = 0; j < headers.length; j++) {
      if (headers[j].toLowerCase().indexOf(candidates[i].toLowerCase()) !== -1) return headers[j];
    }
  }
  return null;
}

// Müşteri eşleştirme: açıklamada firma adı geçiyor mu?
function eslestirMusteri(aciklama) {
  var acikLower = aciklama.toLowerCase();
  var best = null, bestScore = 0;
  DB.musteriler.forEach(function(m) {
    var adLower = m.ad.toLowerCase();
    // Tam eşleşme
    if (acikLower.indexOf(adLower) !== -1) {
      if (adLower.length > bestScore) { best = m; bestScore = adLower.length; }
      return;
    }
    // İlk 2 kelime eşleşmesi
    var kelimeler = adLower.split(/\s+/).slice(0,2).join(' ');
    if (kelimeler.length > 3 && acikLower.indexOf(kelimeler) !== -1) {
      if (kelimeler.length > bestScore) { best = m; bestScore = kelimeler.length; }
    }
  });
  return best;
}

function gosterEslestirme(gelenler) {
  var otomatik = 0, manuel = 0;
  var satirlar = gelenler.map(function(g, idx) {
    var musteri = eslestirMusteri(g.aciklama);
    var mukerrer = musteri ? isMukerrer(musteri.id, g.tarih, g.tutar) : false;

    var musteriSecHTML = '<select class="eslesme-select" data-idx="' + idx + '" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:11px;width:100%">' +
      '<option value="">-- Müşteri seç --</option>' +
      DB.musteriler.slice().sort(function(a,b){ return a.ad.localeCompare(b.ad,'tr'); }).map(function(m) {
        var sel = (musteri && musteri.id === m.id) ? ' selected' : '';
        return '<option value="' + m.id + '"' + sel + '>' + m.ad + '</option>';
      }).join('') +
    '</select>';

    if (musteri && !mukerrer) otomatik++;
    if (!musteri) manuel++;

    var durum = mukerrer
      ? '<span class="badge badge-gray" style="font-size:10px">Zaten kayıtlı</span>'
      : musteri
        ? '<span class="badge badge-green" style="font-size:10px">Eşleşti</span>'
        : '<span class="badge badge-warn" style="font-size:10px">Seç</span>';

    return '<tr style="' + (mukerrer ? 'opacity:.45' : '') + '">' +
      '<td class="td-mono" style="font-size:11px;color:var(--text2)">' + g.tarih.split('-').reverse().join('.') + '</td>' +
      '<td style="font-size:11px;color:var(--text2);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="' + g.aciklama + '">' + g.aciklama + '</td>' +
      '<td class="td-mono td-right" style="color:var(--accent2);font-weight:600">' + g.tutar.toLocaleString('tr-TR',{minimumFractionDigits:2}) + ' ₺</td>' +
      '<td>' + durum + '</td>' +
      '<td style="min-width:180px">' + (mukerrer ? '' : musteriSecHTML) + '</td>' +
    '</tr>';
  }).join('');

  var matchArea = document.getElementById('banka-match-area');
  matchArea.innerHTML =
    '<div class="section-title" style="margin-top:24px">Gelen Ödemeler (' + gelenler.length + ' işlem)</div>' +
    '<div style="margin-bottom:12px;font-size:12px;color:var(--text2)">' +
      '<span style="color:var(--accent2);font-weight:600">' + otomatik + '</span> otomatik eşleşti &nbsp;·&nbsp; ' +
      '<span style="color:var(--warn);font-weight:600">' + manuel + '</span> manuel seçim gerekiyor' +
    '</div>' +
    '<div class="table-wrap">' +
      '<table><thead><tr>' +
        '<th>Tarih</th><th>Açıklama</th><th class="td-right">Tutar</th><th>Durum</th><th>Müşteri</th>' +
      '</tr></thead>' +
      '<tbody id="eslesme-tbody">' + satirlar + '</tbody>' +
    '</table></div>' +
    '<div style="margin-top:16px;display:flex;gap:8px">' +
      '<button class="btn btn-primary" id="banka-kaydet-btn">Seçilenleri Tahsilat Olarak Kaydet</button>' +
      '<button class="btn btn-ghost" id="banka-iptal-btn">İptal</button>' +
    '</div>';

  // Kaydet butonu
  document.getElementById('banka-kaydet-btn').addEventListener('click', function() {
    bankaTahsilatKaydet(gelenler);
  });
  document.getElementById('banka-iptal-btn').addEventListener('click', function() {
    document.getElementById('banka-match-area').innerHTML = '';
    document.getElementById('banka-result-area').innerHTML = '';
  });
}

function isMukerrer(musteriId, tarih, tutar) {
  return DB.islemler.some(function(i) {
    return i.musteriId === musteriId &&
           i.tarih === tarih &&
           i.tutar === tutar &&
           i.tur === 'Tahsilat';
  });
}

function bankaTahsilatKaydet(gelenler) {
  var added = 0, skippedMukerrer = 0, skippedEslesmedi = 0;

  var selectler = document.querySelectorAll('.eslesme-select');
  selectler.forEach(function(sel) {
    var idx    = parseInt(sel.dataset.idx);
    var mid    = sel.value;
    var g      = gelenler[idx];
    if (!mid) { skippedEslesmedi++; return; }

    // Mükerrer kontrol
    if (isMukerrer(mid, g.tarih, g.tutar)) { skippedMukerrer++; return; }

    DB.islemler.push({
      id:        nextIslemId(),
      musteriId: mid,
      tarih:     g.tarih,
      belge:     'BANKA-' + g.tarih.replace(/-/g,''),
      tur:       'Tahsilat',
      aciklama:  g.aciklama,
      tutar:     g.tutar,
      kdv:       0
    });
    added++;
  });

  saveData();
  renderSidebar();
  document.getElementById('banka-match-area').innerHTML = '';
  showBankaResult('success',
    '✓ ' + added + ' tahsilat kaydedildi',
    (skippedMukerrer ? '<strong>' + skippedMukerrer + '</strong> kayıt atlandı (zaten mevcut). ' : '') +
    (skippedEslesmedi ? skippedEslesmedi + ' işlem müşteri seçilmediği için atlandı. ' : '') +
    'Toplam işlem sayısı: <strong>' + DB.islemler.length + '</strong>',
    function() { showPage('dashboard'); }, 'Dashboard\'a Git'
  );
}

function showBankaResult(type, title, detail, btnFn, btnLabel) {
  var area = document.getElementById('banka-result-area');
  if (!area) return;
  area.innerHTML = '<div class="import-result ' + type + '">' +
    '<div class="result-title ' + type + '">' + title + '</div>' +
    '<div class="result-detail">' + detail + '</div>' +
  '</div>';
  var actArea = document.getElementById('banka-action-area');
  if (actArea) {
    actArea.innerHTML = '';
    if (btnFn && btnLabel) {
      var btn = document.createElement('button');
      btn.className = 'btn btn-primary';
      btn.textContent = btnLabel;
      btn.addEventListener('click', btnFn);
      actArea.appendChild(btn);
      var again = document.createElement('button');
      again.className = 'btn btn-ghost';
      again.textContent = 'Tekrar Yükle';
      again.addEventListener('click', function() { renderBanka(); });
      actArea.appendChild(again);
    }
  }
}

document.getElementById('nav-import').addEventListener('click', function() { currentPage='import'; currentMusteriId=null; document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');}); document.getElementById('nav-import').classList.add('active'); renderSidebar(); renderImport(); });
document.getElementById('nav-banka').addEventListener('click', function() { currentPage='banka'; currentMusteriId=null; document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');}); document.getElementById('nav-banka').classList.add('active'); renderSidebar(); renderBanka(); });
document.getElementById('nav-dashboard').addEventListener('click', function() { showPage('dashboard'); });
document.getElementById('nav-musteriler').addEventListener('click', function() { showPage('musteriler'); });
document.getElementById('btn-sidebar-yeni').addEventListener('click', function() { openMusteriModal(null); });

renderSidebar();
renderDashboard();

})();
</script>
</body>
</html>
